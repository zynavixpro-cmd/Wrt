<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monero Wallet Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #e2e8f0; }
        .phone-container {
            max-width: 400px;
            height: 850px;
            margin: 20px auto;
            background: white;
            border: 8px solid #1e293b;
            border-radius: 3rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        @media (max-width: 640px) {
            .phone-container {
                max-width: 100%;
                height: 100vh;
                margin: 0;
                border: none;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    const { useState } = React;

    const App = () => {
        const [step, setStep] = useState('welcome');
        const [restoreMethod, setRestoreMethod] = useState('seed');

        const goBack = () => {
            if (step === 'restore-options') setStep('wallet-selection');
            else if (step === 'restore-detail') setStep('restore-options');
            else if (step === 'wallet-selection') setStep('welcome');
        };

        // المكونات الفرعية
        const InputField = ({ placeholder, icon }) => (
            <div className="relative mb-4">
                <input 
                    type="text" 
                    placeholder={placeholder}
                    className="w-full p-4 bg-gray-50 rounded-2xl border-none shadow-sm placeholder-gray-300 text-slate-700 outline-none focus:ring-2 focus:ring-blue-100 transition-all text-right"
                />
                {icon && <span className="absolute left-4 top-4 opacity-30">{icon}</span>}
            </div>
        );

        return (
            <div className="phone-container">
                {/* 1. صفحة الترحيب */}
                {step === 'welcome' && (
                    <div className="flex flex-col h-full items-center justify-between p-8 bg-gradient-to-b from-blue-50 to-white">
                        <div className="mt-20 text-center">
                            <h1 className="text-6xl font-bold text-blue-400 mb-4">Welcome</h1>
                            <p className="text-gray-600 font-medium text-lg">to Monero.com by Cake Wallet</p>
                            <p className="text-gray-400 mt-24">Awesome wallet for Monero</p>
                        </div>
                        <div className="w-full">
                            <p className="text-xs text-center text-gray-500 mb-4">By continuing, you agree to our <span className="underline cursor-pointer">Terms of Service</span></p>
                            <button onClick={() => setStep('wallet-selection')} className="w-full py-4 bg-blue-400 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">Set a PIN</button>
                        </div>
                    </div>
                )}

                {/* 2. صفحة اختيار المحفظة */}
                {step === 'wallet-selection' && (
                    <div className="flex flex-col h-full p-6">
                        <header className="flex justify-between items-center mb-10">
                            <button onClick={goBack} className="text-2xl text-gray-400">✕</button>
                            <h2 className="text-xl font-bold">Wallet</h2>
                            <div className="w-8 h-8 rounded-full border border-gray-300 flex items-center justify-center text-gray-400">i</div>
                        </header>
                        <div className="flex-1 flex flex-col items-center justify-center text-center">
                            <div className="w-48 h-32 bg-slate-800 rounded-2xl relative mb-8 shadow-xl">
                                <div className="absolute top-0 w-full h-2 bg-orange-400 rounded-t-2xl"></div>
                                <div className="absolute top-2 w-full h-2 bg-blue-300"></div>
                                <div className="absolute bottom-[-15px] right-[-15px] w-12 h-12 bg-blue-400 rounded-full border-4 border-white flex items-center justify-center text-white text-2xl font-bold">+</div>
                            </div>
                            <p className="text-gray-600 mb-6">If you want to start fresh, tap <b>Create New Wallet</b> below.</p>
                            <p className="text-gray-600">If you have an existing wallet, choose <b>Restore Existing Wallet</b>.</p>
                        </div>
                        <div className="space-y-4">
                            <button onClick={() => setStep('restore-options')} className="w-full py-4 bg-white text-slate-700 rounded-2xl font-bold shadow-md border border-gray-100">Restore Wallet</button>
                            <button className="w-full py-4 bg-blue-400 text-white rounded-2xl font-bold shadow-lg">Create New Wallet</button>
                        </div>
                    </div>
                )}

                {/* 3. خيارات الاستعادة */}
                {step === 'restore-options' && (
                    <div className="flex flex-col h-full p-6">
                        <header className="flex items-center mb-10">
                            <button onClick={goBack} className="text-2xl ml-4">←</button>
                            <h2 className="text-xl font-bold">Restore Wallet</h2>
                        </header>
                        <div onClick={() => setStep('restore-detail')} className="w-full p-6 bg-white rounded-3xl shadow-md flex items-center cursor-pointer hover:bg-gray-50">
                            <div className="w-12 h-12 bg-slate-800 rounded-xl mr-auto ml-4 flex items-center justify-center">
                                <span className="text-blue-400 text-xl">🔑</span>
                            </div>
                            <div className="text-right flex-1">
                                <h3 className="font-bold text-slate-800">Restore from seed/keys</h3>
                                <p className="text-gray-400 text-xs leading-relaxed">Get back your wallet from seed/keys that you've saved</p>
                            </div>
                        </div>
                    </div>
                )}

                {/* 4. تفاصيل الاستعادة (Seed/Keys) */}
                {step === 'restore-detail' && (
                    <div className="flex flex-col h-full p-6">
                        <header className="flex items-center mb-6">
                            <button onClick={goBack} className="text-2xl ml-4">←</button>
                            <h2 className="text-xl font-bold">Restore from {restoreMethod}</h2>
                        </header>
                        <div className="flex border-b mb-6 text-center">
                            <div onClick={() => setRestoreMethod('seed')} className={`flex-1 pb-2 cursor-pointer font-bold ${restoreMethod === 'seed' ? 'text-blue-400 border-b-2 border-blue-400' : 'text-gray-300'}`}>Seed</div>
                            <div onClick={() => setRestoreMethod('keys')} className={`flex-1 pb-2 cursor-pointer font-bold ${restoreMethod === 'keys' ? 'text-blue-400 border-b-2 border-blue-400' : 'text-gray-300'}`}>Keys</div>
                        </div>
                        <div className="flex-1 overflow-y-auto">
                            <InputField placeholder="Wallet name" icon="🔄" />
                            {restoreMethod === 'seed' ? (
                                <>
                                    <InputField placeholder="Enter your seed phrase" icon="📋" />
                                    <InputField placeholder="Polyseed (16 words)" />
                                    <InputField placeholder="English (Seed language)" />
                                </>
                            ) : (
                                <>
                                    <InputField placeholder="Address" />
                                    <InputField placeholder="View key (private)" />
                                    <InputField placeholder="Spend key (private)" />
                                </>
                            )}
                        </div>
                        <button className="w-full py-4 bg-blue-100 text-white rounded-2xl font-bold mt-4 cursor-not-allowed">Restore</button>
                    </div>
                )}
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
